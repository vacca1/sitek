<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Konnecta — Infraestrutura de IA para empresas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --bg-elev: #0b0b0b;
    --bg-card: #101010;
    --line: #1a1a1a;
    --line-strong: #262626;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.62);
    --text-faint: rgba(255,255,255,0.38);
    --lime: #CBFF00;
    --lime-soft: rgba(203,255,0,0.12);
    --lime-line: rgba(203,255,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(203,255,0,0.06), transparent 60%),
      radial-gradient(800px 500px at -10% 30%, rgba(203,255,0,0.03), transparent 60%),
      var(--bg);
  }
  ::selection { background: var(--lime); color: #000; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .display { font-family: 'Space Grotesk', sans-serif; font-weight: 500; letter-spacing: -0.04em; line-height: 0.92; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .serif-it { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; letter-spacing: -0.01em; }

  /* Halftone overlay */
  .halftone {
    background-image: radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 4px 4px;
    mix-blend-mode: overlay;
    opacity: 0.15;
  }

  /* Liquid glass effect */
  .liquid-glass {
    position: relative;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.18), 0 4px 30px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .liquid-glass::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(203,255,0,0.6) 0%,
      rgba(255,255,255,0.2) 30%,
      rgba(255,255,255,0) 50%,
      rgba(255,255,255,0.2) 70%,
      rgba(203,255,0,0.6) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass::after {
    content: ''; position: absolute; top: 0; left: -50%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(203,255,0,0.25), transparent);
    transform: skewX(-20deg);
    transition: left 0.7s ease;
    pointer-events: none;
  }
  .liquid-glass:hover::after { left: 150%; }

  @keyframes shimmer-glass {
    0%, 100% { box-shadow: inset 0 1px 1px rgba(255,255,255,0.18), 0 4px 20px rgba(203,255,0,0.15); }
    50% { box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 4px 30px rgba(203,255,0,0.35); }
  }
  .glass-pulse { animation: shimmer-glass 2.4s ease-in-out infinite; }

  /* Animated grid bg pattern */
  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  /* lime arrow pattern from brand */
  .arrow-pattern {
    background-color: #000;
    background-image:
      linear-gradient(135deg, transparent 46%, var(--lime) 46%, var(--lime) 54%, transparent 54%),
      linear-gradient(45deg, transparent 46%, var(--lime) 46%, var(--lime) 54%, transparent 54%);
    background-size: 28px 28px;
    background-position: 0 0, 14px 14px;
  }

  /* Marquee */
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 40s linear infinite; }

  /* Pulse */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(203,255,0,0.7); }
    50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(203,255,0,0); }
  }
  .pulse-dot { animation: pulse-dot 1.8s ease-in-out infinite; }

  /* Number ticker */
  @keyframes scan {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }
  .scan-line {
    background: linear-gradient(90deg, transparent, rgba(203,255,0,0.6), transparent);
    background-size: 200% 100%;
    animation: scan 3s linear infinite;
  }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.8s cubic-bezier(.2,.7,.2,1), transform 0.8s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* Buttons */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--lime); color: #000;
    padding: 14px 22px; border-radius: 999px;
    font-weight: 600; font-size: 14px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(203,255,0,0.25); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent; color: #fff;
    padding: 13px 22px; border-radius: 999px;
    font-weight: 500; font-size: 14px;
    border: 1px solid rgba(255,255,255,0.18);
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.04); }

  /* Card */
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005));
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .card:hover { border-color: var(--line-strong); }

  /* Konnecta logo (custom SVG inline) — wordmark with sawtooth NN */
  .logo-mark { display: inline-flex; align-items: center; gap: 8px; }

  /* Section labels */
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-dim);
  }
  .eyebrow::before {
    content: ""; width: 6px; height: 6px; background: var(--lime); border-radius: 50%;
    box-shadow: 0 0 12px var(--lime);
  }

  /* Hide scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }

  /* Konnecta wordmark SVG sizing */
  .konnecta-word { height: 18px; }
  .konnecta-word.big { height: 28px; }

  /* Glow halo */
  .halo::before {
    content: ""; position: absolute; inset: -1px; border-radius: inherit;
    background: linear-gradient(135deg, rgba(203,255,0,0.4), transparent 40%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    padding: 1px; pointer-events: none;
  }

  /* Typewriter caret */
  @keyframes caret { 50% { opacity: 0; } }
  .caret { display: inline-block; width: 10px; height: 1.1em; background: var(--lime); margin-left: 4px; vertical-align: -3px; animation: caret 0.9s steps(1) infinite; }

  /* TextType (rotating typewriter) */
  .text-type { display: inline; white-space: pre-wrap; }
  .text-type__content { color: inherit; }
  .text-type__cursor {
    display: inline-block;
    width: 0.06em;
    height: 0.85em;
    margin-left: 0.08em;
    vertical-align: -0.06em;
    background: var(--lime);
    box-shadow: 0 0 14px rgba(203,255,0,0.6);
    animation: tt-blink 0.9s steps(1) infinite;
    border-radius: 1px;
  }
  .text-type__cursor--hidden { opacity: 0; }
  @keyframes tt-blink { 50% { opacity: 0; } }

  /* node lines */
  .node-line { stroke: rgba(255,255,255,0.12); stroke-width: 1; fill: none; }
  .node-line.active { stroke: var(--lime); stroke-width: 1.2; }

  @keyframes flow {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -40; }
  }
  .flow { stroke-dasharray: 4 4; animation: flow 2s linear infinite; }

  /* Step number */
  .step-num {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 300; font-size: 80px; line-height: 1;
    color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.18);
  }

  /* tag */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    color: var(--text-dim);
  }
  .tag.lime { background: var(--lime-soft); border-color: var(--lime-line); color: var(--lime); }

  /* Chat-like demo */
  .chat-bubble {
    padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 80%;
    line-height: 1.4;
  }
  .chat-bubble.in { background: #1a1a1a; color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; }
  .chat-bubble.out { background: var(--lime); color: #000; border-bottom-right-radius: 4px; align-self: flex-end; }

  /* Konnecta arrow icon */
  .k-arrow path { fill: var(--lime); }

  /* counter bar fill */
  .bar-fill { transition: width 1.4s cubic-bezier(.2,.7,.2,1); }

  /* tabs */
  .tab-btn { transition: color 0.2s, background 0.2s; }
  .tab-btn[data-active="true"] { color: #000; background: var(--lime); }

  /* link underline */
  .link-arrow { display: inline-flex; align-items: center; gap: 6px; color: var(--lime); font-weight: 500; font-size: 13px; }
  .link-arrow:hover .arrow-i { transform: translate(2px, -2px); }
  .arrow-i { transition: transform 0.2s; }

  /* ============== RESPONSIVE ============== */
  /* Tablet & smaller */
  @media (max-width: 1024px) {
    .step-num { font-size: 80px; }
    /* hero already handled in JSX */
    /* generic 4-col grids -> 2 */
    [data-grid="4"] { grid-template-columns: repeat(2, 1fr) !important; }
    [data-grid="3"] { grid-template-columns: repeat(2, 1fr) !important; }
    [data-grid="2"] { grid-template-columns: 1fr !important; }
    /* bento spans collapse */
    [data-bento] { grid-template-columns: 1fr !important; }
    [data-bento] > * { grid-column: span 1 !important; }
    /* generic two-col split */
    [data-split] { grid-template-columns: 1fr !important; }
    /* known classes */
    .grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
    .platform-grid { grid-template-columns: 1fr !important; }
    .roi-grid { grid-template-columns: 1fr !important; }
    .grid-2-stack { grid-template-columns: 1fr !important; gap: 40px !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 40px !important; }
    .hero-grid { grid-template-columns: 1fr !important; }
  }

  /* Mobile */
  @media (max-width: 768px) {
    .step-num { font-size: 56px; }
    /* spacious section padding shrinks */
    section { padding-left: 20px !important; padding-right: 20px !important; }
    /* large titles cap */
    .display { letter-spacing: -0.02em; }
    h1.display, h2.display { font-size: clamp(32px, 8vw, 52px) !important; }
    /* nav tweaks */
    .hide-mobile { display: none !important; }
    .nav-links { display: none !important; }
    .nav-cta-text { display: none !important; }
    /* tabs scroll */
    .platform-tabs { overflow-x: auto !important; flex-wrap: nowrap !important; -webkit-overflow-scrolling: touch; }
    .platform-tabs::-webkit-scrollbar { display: none; }
    .platform-tabs button { flex-shrink: 0; }
    /* stat row -> 2 cols */
    [data-stats] { grid-template-columns: repeat(2, 1fr) !important; gap: 16px !important; }
    /* dashboard card */
    .dashboard-mock { padding: 14px !important; }
    /* bento gap */
    [data-bento] { gap: 12px !important; }
    /* hide complex flow on small */
    .agentic-flow-wrap { aspect-ratio: 4/5 !important; }
    /* 3-col -> 1 */
    [data-grid="3"] { grid-template-columns: 1fr !important; }
    [data-grid="4"] { grid-template-columns: repeat(2, 1fr) !important; }
    .grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
    .grid-3 { grid-template-columns: 1fr !important; }
    /* tabs scroll horizontal */
    [data-tabs] { overflow-x: auto !important; flex-wrap: nowrap !important; -webkit-overflow-scrolling: touch; }
    [data-tabs]::-webkit-scrollbar { display: none; }
    /* table wrap */
    [data-scroll-x] { overflow-x: auto !important; }
    /* portrait card */
    .portrait-card { aspect-ratio: 1/1 !important; }
    /* footer cols */
    .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    [data-footer] { grid-template-columns: 1fr !important; gap: 32px !important; }
    /* logo strip slower */
    .logo-strip-track { animation-duration: 60s !important; }
    /* font slightly smaller for body */
    body { font-size: 15px; }
    /* lead form modal full width */
    .lead-form-modal { width: 92vw !important; max-width: 100% !important; padding: 24px !important; }
    /* WhatsApp float bottom */
    .wa-float { bottom: 20px !important; right: 20px !important; }
    /* reduce huge paddings */
    section[style*="120px"] { padding-top: 60px !important; padding-bottom: 60px !important; }
    section[style*="140px"] { padding-top: 70px !important; padding-bottom: 70px !important; }
    /* card paddings smaller */
    .card { border-radius: 16px; }
    /* Solutions / process cards font tighter */
    .bento-grid .card { padding: 24px !important; }
    /* Make horizontal-scroll containers for wide tables */
    .data-table { display: block !important; overflow-x: auto !important; }
  }

  /* Small mobile */
  @media (max-width: 480px) {
    h1.display, h2.display { font-size: clamp(28px, 9vw, 44px) !important; }
    [data-stats] { grid-template-columns: 1fr 1fr !important; }
    [data-grid="4"] { grid-template-columns: 1fr 1fr !important; }
    .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
    [data-cta-row] { flex-direction: column !important; align-items: stretch !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</body>
